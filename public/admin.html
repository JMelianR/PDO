<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tab-nav { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); }
        .tab-nav a {
            padding: 12px 24px; text-decoration: none; color: var(--text-secondary);
            font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s;
        }
        .tab-nav a:hover { color: var(--text-primary); }
        .tab-nav a.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
    </style>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        
        if (!token || user?.role !== 'admin') {
            window.location.href = '/index.html';
        }
    </script>
</head>
<body>
    <nav class="navbar slide-in">
        <div class="navbar-brand">🏫 Colegio Generico</div>
        <div class="navbar-nav">
            <span class="user-badge" id="user-badge-text"></span>
            <button onclick="logout()" class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem;">Cerrar Sesión</button>
        </div>
    </nav>
    <main class="container fade-in">
        <div class="grid" style="grid-template-columns: 1fr; margin-bottom: 2rem;">
            <div>
                <h2>Panel de Administración 👑</h2>
            </div>
        </div>

        <div id="messages" class="alert alert-success" style="display:none;"></div>

        <div class="tab-nav">
            <a href="/admin.html" class="active">👤 Usuarios</a>
            <a href="/admin-materias.html">📚 Materias</a>
            <a href="/admin-cursos.html">🏫 Cursos y Notas</a>
            <a href="/admin-horarios.html">📅 Horarios</a>
            <a href="/admin-anio.html">🗓️ Año Escolar</a>
        </div>
        
        <div class="card fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; flex-wrap: wrap; gap: 10px;">
                <h3 style="margin: 0; white-space: nowrap;">Usuarios y Profesores</h3>
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Filtrar por nombre..." onkeyup="filterUsers()" style="flex: 1; max-width: 300px; margin: 0 auto; border-radius: 20px;">
                <button id="fabBtn" onclick="openUserModal()" title="Agregar nuevo usuario" style="height: 44px; border-radius: 22px; padding: 0 20px; background: var(--accent-primary); color: white; font-size: 15px; font-weight: 600; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(59,130,246,0.4); display: flex; align-items: center; gap: 8px; justify-content: center; transition: transform 0.2s, background 0.2s;">
                    <span style="font-size: 22px; margin-top: -2px;">+</span>
                    <span>Agregar Nuevo Usuario</span>
                </button>
            </div>
            <table class="table" id="users-table">
                <thead>
                    <tr>
                        <th>Usuario</th><th>Nombre</th><th>Rol</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Crear Usuario -->
    <div id="userModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); z-index:9999; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:440px; position:relative; background: var(--bg-secondary); border: 1px solid var(--accent-primary); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <button onclick="closeUserModal()" style="position:absolute; top:20px; right:20px; background:transparent; border:none; font-size:28px; color:var(--text-secondary); cursor:pointer; line-height:1;">&times;</button>
            <h3 style="margin-top:0; margin-bottom:1.5rem; color: var(--accent-primary);">Nuevo Usuario</h3>
            <form id="createUserForm" autocomplete="off">
                <input type="hidden" name="action" value="create_user">
                <div class="form-group">
                    <input class="form-control" type="text" name="username" placeholder="Nuevo nombre de usuario" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="password" placeholder="Nueva contraseña" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <select class="form-control" name="role" required>
                        <option value="alumno">Alumno</option>
                        <option value="profesor">Profesor</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <input class="form-control" type="text" name="nombre" placeholder="Nombre" required>
                </div>
                <div class="form-group">
                    <input class="form-control" type="text" name="apellido" placeholder="Apellido" required>
                </div>
                <button type="submit" id="userSubmitBtn" class="btn btn-primary" style="width:100%; margin-top: 1rem;">Guardar Usuario</button>
            </form>
        </div>
    </div>

    <!-- Modal Cambiar Clave -->
    <div id="passModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); z-index:9999; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:400px; position:relative; background: var(--bg-secondary); border: 1px solid var(--accent-primary); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <button onclick="closePassModal()" style="position:absolute; top:20px; right:20px; background:transparent; border:none; font-size:28px; color:var(--text-secondary); cursor:pointer; line-height:1;">&times;</button>
            <h3 style="margin-top:0; margin-bottom:1.5rem; color: var(--accent-primary);">Cambiar Contraseña</h3>
            <form id="changePassForm">
                <input type="hidden" name="action" value="update_password">
                <input type="hidden" name="user_id" id="pass_user_id" value="">
                <div class="form-group">
                    <input class="form-control" type="password" name="new_password" placeholder="Nueva Contraseña" required minlength="4">
                </div>
                <button type="submit" id="passSubmitBtn" class="btn btn-primary" style="width:100%; margin-top: 1rem;">Actualizar Clave</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('user-badge-text').textContent = `${user.name} (Admin)`;

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        async function loadData() {
            const res = await fetch('/api/admin', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                const tbody = document.getElementById('users-tbody');
                tbody.innerHTML = '';
                data.users.forEach(u => {
                    const row = `<tr>
                        <td>${u.username}</td>
                        <td>${u.nombre} ${u.apellido}</td>
                        <td><span class="badge ${u.role === 'admin' ? 'badge-primary' : (u.role === 'profesor' ? 'badge-info' : 'badge-neutral')}" style="text-transform: capitalize;">${u.role}</span></td>
                        <td>
                            <button class="btn" style="padding:4px 10px; font-size:13px; background: var(--accent-primary); color: white; border: none; border-radius: 4px;" onclick="openPassModal(${u.id})">🔑 Clave</button>
                            ${u.username !== 'admin' ? `<button class="btn" style="padding:4px 10px; font-size:13px; background: #ef4444; color: white; border: none; border-radius: 4px; margin-left: 4px;" onclick="deleteUser(${u.id}, '${u.username}')">🗑️ Eliminar</button>` : ''}
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } else if (res.status === 401) {
                logout();
            }
        }

        loadData();

        function openUserModal() { document.getElementById('userModal').style.display = 'flex'; }
        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('userSubmitBtn');
            btn.disabled = true;
            btn.textContent = 'Guardando...';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    closeUserModal();
                    loadData();
                    e.target.reset();
                    showMsg(result.message || 'Usuario creado', true);
                } else {
                    showMsg(result.error || 'Error al crear', false);
                }
            } catch (err) {
                showMsg('Error de conexión', false);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Guardar Usuario';
            }
        });

        function openPassModal(userId) { 
            document.getElementById('pass_user_id').value = userId;
            document.getElementById('passModal').style.display = 'flex'; 
        }
        function closePassModal() { 
            document.getElementById('passModal').style.display = 'none'; 
            document.getElementById('changePassForm').reset();
        }

        document.getElementById('changePassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('passSubmitBtn');
            btn.disabled = true;
            btn.textContent = 'Actualizando...';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    closePassModal();
                    showMsg(result.message || 'Contraseña actualizada', true);
                } else {
                    showMsg(result.error || 'Error al actualizar', false);
                }
            } catch (err) {
                showMsg('Error de conexión', false);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Actualizar Clave';
            }
        });

        async function deleteUser(id, username) {
            if (!confirm(`¿Estás completamente seguro de eliminar a "${username}"? Esta acción no se puede deshacer.`)) return;
            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ action: 'delete_user', user_id: id })
                });
                const result = await res.json();
                if (res.ok) {
                    showMsg('Usuario eliminado permanentemente', true);
                    loadData();
                } else {
                    showMsg(result.error || 'Error al eliminar', false);
                }
            } catch (err) {
                showMsg('Error de red', false);
            }
        }

        function showMsg(text, isSuccess) {
            const msg = document.getElementById('messages');
            msg.textContent = text;
            msg.className = isSuccess ? 'alert alert-success' : 'alert alert-error';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function filterUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#users-tbody tr');
            rows.forEach(row => {
                const nombre = row.cells[1].textContent.toLowerCase();
                const usuario = row.cells[0].textContent.toLowerCase();
                if (nombre.includes(query) || usuario.includes(query)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
