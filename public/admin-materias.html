<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Materias</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tab-nav { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); }
        .tab-nav a {
            padding: 12px 24px; text-decoration: none; color: var(--text-secondary);
            font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s;
        }
        .tab-nav a:hover { color: var(--text-primary); }
        .tab-nav a.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .section-grid { grid-template-columns: 1fr; } }
        .mini-form { display: flex; gap: 8px; margin-bottom: 1rem; }
        .mini-form input, .mini-form select { flex: 1; }
        .assignment-chip {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
            background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
            border-radius: 20px; font-size: 13px; color: var(--text-primary); margin: 4px;
        }
        .assignment-chip button {
            background: #ef4444; color: white; border: none; border-radius: 50%;
            width: 20px; height: 20px; font-size: 14px; cursor: pointer; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .subject-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid var(--border-color);
        }
        .subject-item:last-child { border-bottom: none; }

        /* Custom Confirm Modal */
        .confirm-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 9999; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: #1e293b; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 2rem; max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .confirm-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .confirm-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
        .confirm-msg { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
        .confirm-actions { display: flex; gap: 0.75rem; justify-content: center; }
        .btn-cancel {
            padding: 8px 24px; background: transparent; border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-secondary); cursor: pointer;
            font-size: 0.9rem; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .btn-confirm-delete {
            padding: 8px 24px; background: #ef4444; border: none; border-radius: 8px;
            color: white; cursor: pointer; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .btn-confirm-delete:hover { background: #dc2626; transform: translateY(-1px); }
    </style>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        if (!token || user?.role !== 'admin') { window.location.href = '/index.html'; }
    </script>
</head>
<body>
    <nav class="navbar slide-in">
        <div class="navbar-brand">🏫 Colegio Generico</div>
        <div class="navbar-nav">
            <span class="user-badge" id="user-badge-text"></span>
            <button onclick="logout()" class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem;">Cerrar Sesión</button>
        </div>
    </nav>
    <main class="container fade-in">
        <div class="grid" style="grid-template-columns: 1fr; margin-bottom: 0;">
            <div>
                <h2>Panel de Administración 👑</h2>
            </div>
        </div>

        <div class="tab-nav">
            <a href="/admin.html">👤 Usuarios</a>
            <a href="/admin-materias.html" class="active">📚 Materias</a>
            <a href="/admin-cursos.html">🏫 Cursos y Notas</a>
            <a href="/admin-anio.html">📅 Año Escolar</a>
        </div>

        <div id="messages" class="alert alert-success" style="display:none;"></div>

        <div class="section-grid">
            <!-- Columna Izquierda: Materias -->
            <div class="card fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">
                    <h3 style="margin: 0;">📚 Materias</h3>
                </div>
                <div class="mini-form">
                    <input type="text" id="newSubjectName" class="form-control" placeholder="Nombre de la materia...">
                    <button onclick="createSubject()" class="btn btn-primary" style="white-space: nowrap; padding: 8px 16px;">+ Crear</button>
                </div>
                <div id="subjects-list">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Columna Derecha: Asignaciones -->
            <div class="card fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">
                    <h3 style="margin: 0;">🔗 Asignar Materia a Profesor</h3>
                </div>
                <div class="mini-form">
                    <select id="assignProfessor" class="form-control">
                        <option value="">Seleccionar profesor...</option>
                    </select>
                    <select id="assignSubject" class="form-control">
                        <option value="">Seleccionar materia...</option>
                    </select>
                    <button onclick="assignSubject()" class="btn btn-primary" style="white-space: nowrap; padding: 8px 16px;">Asignar</button>
                </div>
                <h4 style="margin: 1.5rem 0 0.5rem; color: var(--text-secondary); font-size: 14px;">Asignaciones Actuales</h4>
                <div id="assignments-list">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Confirm Modal -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <div class="confirm-icon">🗑️</div>
            <div class="confirm-title" id="confirm-title">¿Eliminar materia?</div>
            <div class="confirm-msg" id="confirm-msg">Esta acción no se puede deshacer.</div>
            <div class="confirm-actions">
                <button class="btn-cancel" id="confirm-cancel-btn" onclick="closeConfirm()">Cancelar</button>
                <button class="btn-confirm-delete" id="confirm-ok-btn">🗑️ Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('user-badge-text').textContent = `${user.name} (Admin)`;

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        let appData = {};

        function showConfirm(title, msg, onConfirm) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-msg').textContent = msg;
            const okBtn = document.getElementById('confirm-ok-btn');
            // Clone to remove previous event listeners
            const newBtn = okBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newBtn, okBtn);
            newBtn.addEventListener('click', () => {
                closeConfirm();
                onConfirm();
            });
            document.getElementById('confirm-overlay').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('active');
        }

        // Close on overlay backdrop click
        document.getElementById('confirm-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeConfirm();
        });

        async function loadData() {
            try {
                const res = await fetch('/api/admin', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    appData = await res.json();
                    renderSubjects();
                    renderDropdowns();
                    renderAssignments();
                } else if (res.status === 401) {
                    logout();
                }
            } catch (err) {
                showMsg('Error de conexión', false);
            }
        }

        function renderSubjects() {
            const container = document.getElementById('subjects-list');
            if (!appData.subjects || appData.subjects.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 1rem;">No hay materias creadas aún</p>';
                return;
            }
            container.innerHTML = appData.subjects.map(s => `
                <div class="subject-item">
                    <span style="font-weight: 500;">${s.nombre}</span>
                    <button class="btn" style="padding:4px 10px; font-size:13px; background: #ef4444; color: white; border: none; border-radius: 4px;" onclick="deleteSubject(${s.id}, '${s.nombre.replace(/'/g, "\\'")}')">🗑️ Eliminar</button>
                </div>
            `).join('');
        }

        function renderDropdowns() {
            const profSelect = document.getElementById('assignProfessor');
            const subjSelect = document.getElementById('assignSubject');

            profSelect.innerHTML = '<option value="">Seleccionar profesor...</option>';
            if (appData.professors) {
                appData.professors.forEach(p => {
                    profSelect.innerHTML += `<option value="${p.id}">${p.nombre} ${p.apellido}</option>`;
                });
            }

            subjSelect.innerHTML = '<option value="">Seleccionar materia...</option>';
            if (appData.subjects) {
                appData.subjects.forEach(s => {
                    subjSelect.innerHTML += `<option value="${s.id}">${s.nombre}</option>`;
                });
            }
        }

        function renderAssignments() {
            const container = document.getElementById('assignments-list');
            if (!appData.assignments || appData.assignments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 1rem;">No hay asignaciones aún</p>';
                return;
            }
            container.innerHTML = appData.assignments.map(a => `
                <div class="assignment-chip">
                    <strong>${a.professor_name}</strong> → ${a.subject_name}
                    <button onclick="unassignSubject(${a.professor_id}, ${a.subject_id})" title="Desasignar">&times;</button>
                </div>
            `).join('');
        }

        async function apiPost(data) {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            return { ok: res.ok, ...json };
        }

        async function createSubject() {
            const input = document.getElementById('newSubjectName');
            const nombre = input.value.trim();
            if (!nombre) return showMsg('Escribe un nombre para la materia', false);
            try {
                const result = await apiPost({ action: 'create_subject', nombre });
                showMsg(result.message || result.error, result.ok);
                input.value = '';
                loadData();
            } catch (err) { showMsg('Error de conexión', false); }
        }

        function deleteSubject(id, nombre) {
            showConfirm(
                '¿Eliminar materia?',
                `Se eliminará "${nombre}" y se desasignará de todos los profesores.`,
                async () => {
                    try {
                        const result = await apiPost({ action: 'delete_subject', subject_id: id });
                        showMsg(result.message || result.error, result.ok);
                        loadData();
                    } catch (err) { showMsg('Error de conexión', false); }
                }
            );
        }

        async function assignSubject() {
            const professor_id = document.getElementById('assignProfessor').value;
            const subject_id = document.getElementById('assignSubject').value;
            if (!professor_id || !subject_id) return showMsg('Selecciona un profesor y una materia', false);
            try {
                const result = await apiPost({ action: 'assign_subject', professor_id, subject_id });
                showMsg(result.message || result.error, result.ok);
                loadData();
            } catch (err) { showMsg('Error de conexión', false); }
        }

        function unassignSubject(professor_id, subject_id) {
            showConfirm(
                '¿Desasignar materia?',
                'Se quitará esta asignación del profesor.',
                async () => {
                    try {
                        const result = await apiPost({ action: 'unassign_subject', professor_id, subject_id });
                        showMsg(result.message || result.error, result.ok);
                        loadData();
                    } catch (err) { showMsg('Error de conexión', false); }
                }
            );
        }

        function showMsg(text, isSuccess) {
            const msg = document.getElementById('messages');
            msg.textContent = text;
            msg.className = isSuccess ? 'alert alert-success' : 'alert alert-error';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // Enter key to create subject
        document.getElementById('newSubjectName').addEventListener('keyup', e => {
            if (e.key === 'Enter') createSubject();
        });

        loadData();
    </script>
</body>
</html>
