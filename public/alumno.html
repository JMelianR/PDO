<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Boletín | Colegio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 1.5rem; text-align: center;
        }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--accent-primary); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .grade-pill {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-weight: 700; font-size: 1rem; min-width: 50px; text-align: center;
        }
        .grade-high { background: rgba(16,185,129,0.15); color: var(--success); }
        .grade-mid  { background: rgba(245,158,11,0.15); color: var(--warning); }
        .grade-low  { background: rgba(239,68,68,0.15); color: var(--danger); }
        .course-section { margin-bottom: 2.5rem; }
        .course-header {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.5rem; background: rgba(96,165,250,0.08);
            border-left: 4px solid var(--accent-primary); border-radius: 8px;
            margin-bottom: 1rem;
        }
        .course-title { font-size: 1.15rem; font-weight: 600; color: var(--text-primary); }
        .course-avg { font-size: 0.95rem; color: var(--text-secondary); margin-left: auto; }
        .period-group { margin-bottom: 1rem; }
        .period-label {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-secondary); font-weight: 600; margin-bottom: 0.5rem;
        }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 1.1rem; }
        .table { width: 100%; border-collapse: collapse; }
        .progress-bar-bg {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden; margin-top: 4px;
        }
        .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    </style>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        if (!token || user?.role !== 'alumno') window.location.href = '/index.html';
    </script>
</head>
<body>
    <nav class="navbar slide-in">
        <div class="navbar-brand">🏫 Colegio</div>
        <div class="navbar-nav">
            <span class="user-badge" id="user-badge-text"></span>
            <button onclick="logout()" class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem;">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="container fade-in">
        <div style="margin-bottom: 2rem;">
            <h2>Mi Boletín 🎒</h2>
            <p id="welcome-msg">Cargando tus calificaciones...</p>
        </div>

        <div id="messages" class="alert" style="display:none; margin-bottom:1rem;"></div>

        <!-- Stats -->
        <div class="stat-grid" id="stat-grid" style="display:none;">
            <div class="stat-card">
                <div class="stat-number" id="stat-courses">0</div>
                <div class="stat-label">Cursos Inscripto</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-grades">0</div>
                <div class="stat-label">Calificaciones</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-avg">—</div>
                <div class="stat-label">Promedio General</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-status">—</div>
                <div class="stat-label">Estado Académico</div>
            </div>
        </div>

        <!-- Grades by course -->
        <div id="grades-container">
            <div class="empty-state">⏳ Cargando...</div>
        </div>
    </main>

    <script>
        document.getElementById('user-badge-text').textContent = `${user.name} (Alumno)`;

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        function showMsg(text, isSuccess) {
            const el = document.getElementById('messages');
            el.textContent = text;
            el.className = isSuccess ? 'alert alert-success' : 'alert alert-error';
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3500);
        }

        function gradeClass(val) {
            if (val >= 7) return 'grade-high';
            if (val >= 5) return 'grade-mid';
            return 'grade-low';
        }

        function gradeBarColor(val) {
            if (val >= 7) return 'var(--success)';
            if (val >= 5) return 'var(--warning)';
            return 'var(--danger)';
        }

        async function loadData() {
            try {
                const res = await fetch('/api/student', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) { logout(); return; }
                if (!res.ok) {
                    const err = await res.json();
                    showMsg('Error: ' + (err.error || res.status), false);
                    return;
                }
                const data = await res.json();
                renderPage(data);
            } catch (err) {
                showMsg('Error de conexión: ' + err.message, false);
            }
        }

        function renderPage(data) {
            const { courses, grades } = data;

            // Stats
            const allValues = grades.map(g => g.value).filter(v => v !== null && v !== undefined);
            const avg = allValues.length > 0 ? (allValues.reduce((a, b) => a + b, 0) / allValues.length) : null;
            const avgStr = avg !== null ? avg.toFixed(1) : '—';
            const failing = allValues.filter(v => v < 5).length;
            const statusStr = allValues.length === 0 ? '—' : (failing === 0 ? '✅ Regular' : `⚠️ ${failing} baja(s)`);

            document.getElementById('stat-courses').textContent = courses.length;
            document.getElementById('stat-grades').textContent = grades.length;
            document.getElementById('stat-avg').textContent = avgStr;
            document.getElementById('stat-status').textContent = allValues.length === 0 ? '—' : (failing === 0 ? '✅' : `⚠️ ${failing}`);
            document.getElementById('stat-grid').style.display = 'grid';

            document.getElementById('welcome-msg').textContent = courses.length > 0
                ? `Estás inscripto en ${courses.length} curso(s). ${grades.length > 0 ? `Tienes ${grades.length} calificacion(es) con un promedio de ${avgStr}.` : 'Aún no tienes calificaciones registradas.'}`
                : 'No estás inscripto en ningún curso todavía. Contacta al administrador.';

            const container = document.getElementById('grades-container');

            if (courses.length === 0) {
                container.innerHTML = '<div class="empty-state">No estás inscripto en ningún curso.</div>';
                return;
            }

            let html = '';
            courses.forEach(course => {
                const courseGrades = grades.filter(g => String(g.course_id) === String(course.id));
                const courseValues = courseGrades.map(g => g.value).filter(v => v != null);
                const courseAvg = courseValues.length > 0
                    ? (courseValues.reduce((a, b) => a + b, 0) / courseValues.length).toFixed(1)
                    : null;

                // Group by period
                const byPeriod = {};
                courseGrades.forEach(g => {
                    const p = g.period || 'Sin período';
                    if (!byPeriod[p]) byPeriod[p] = [];
                    byPeriod[p].push(g);
                });

                let periodsHtml = '';
                if (Object.keys(byPeriod).length === 0) {
                    periodsHtml = '<p style="color:var(--text-secondary); padding: 1rem 0;">No hay calificaciones para este curso todavía.</p>';
                } else {
                    Object.entries(byPeriod).forEach(([period, pGrades]) => {
                        const pRows = pGrades.map(g => {
                            const cls = gradeClass(g.value);
                            const barColor = gradeBarColor(g.value);
                            const pct = Math.round((g.value / 10) * 100);
                            const subj = g.subject_name ? `<span class="badge badge-info" style="font-size:0.75rem; display:inline-block; margin-right:4px;">${g.subject_name}</span>` : '';
                            return `<tr>
                                <td>${g.type}${subj}</td>
                                <td>
                                    <span class="grade-pill ${cls}">${g.value}</span>
                                    <div class="progress-bar-bg">
                                        <div class="progress-bar-fill" style="width:${pct}%; background:${barColor};"></div>
                                    </div>
                                </td>
                                <td style="color:var(--text-secondary); font-size:0.85rem;">${g.professor_name || '—'}</td>
                            </tr>`;
                        }).join('');

                        periodsHtml += `
                            <div class="period-group">
                                <div class="period-label">📅 ${period}</div>
                                <div style="overflow-x:auto;">
                                    <table class="table">
                                        <thead><tr><th>Evaluación</th><th>Nota</th><th>Profesor</th></tr></thead>
                                        <tbody>${pRows}</tbody>
                                    </table>
                                </div>
                            </div>`;
                    });
                }

                const avgDisplay = courseAvg
                    ? `<span style="font-size:0.9rem;">Promedio del curso: <strong style="color:${gradeBarColor(parseFloat(courseAvg))}; font-size:1.1rem;">${courseAvg}</strong></span>`
                    : '<span style="color:var(--text-secondary); font-size:0.85rem;">Sin calificaciones aún</span>';

                html += `
                    <div class="course-section card fade-in">
                        <div class="course-header">
                            <span style="font-size:1.5rem;">📚</span>
                            <div>
                                <div class="course-title">${course.nombre}</div>
                                <div style="font-size:0.82rem; color:var(--text-secondary);">${course.anio} — División ${course.division}</div>
                            </div>
                            <div class="course-avg">${avgDisplay}</div>
                        </div>
                        ${periodsHtml}
                    </div>`;
            });

            container.innerHTML = html;
        }

        loadData();
    </script>
</body>
</html>
